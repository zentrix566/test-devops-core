apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-devops-core
  labels:
    app: test-devops-core
    managed-by: devops-core  # 标记这是由你的自动化系统管理的
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-devops-core
  template:
    metadata:
      labels:
        app: test-devops-core
    spec:
      containers:
      - name: app-container
        image: registry.cn-beijing.aliyuncs.com/my-project/test-devops-core:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"